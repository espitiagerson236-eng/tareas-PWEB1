html <!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./inventario.css">
  <title>Inventario Interactivo</title>
</head>

<body>
  <h1>Sistema de Inventario</h1>

  <section class="card">
    <h3>PRODUCTOS</h3>

    <section class="form-grid">
      <label for="productoSelect">Producto:</label>
      <select id="productoSelect">
        <option value="Manzanas">Manzanas</option>
        <option value="Platanos">Platanos</option>
        <option value="Espinacas">Espinacas</option>
        <option value="Zanahorias">Zanahorias</option>
        <option value="Tomates">Tomates</option>
        <option value="Pollo">Pollo</option>
        <option value="Huevos">Huevos</option>
        <option value="Salmon">Salmon</option>
        <option value="Carne de res">Carne de res</option>
        <option value="Atun en lata">Atun en lata</option>
        <option value="Arroz">Arroz</option>
        <option value="Avena en hojuelas">Avena en hojuelas</option>
        <option value="Pasta">Pasta</option>
        <option value="Papa">Papa</option>
        <option value="Leche">Leche</option>
        <option value="Queso">Queso</option>
        <option value="Aceite de oliva">Aceite de oliva</option>
        <option value="Lentejas">Lentejas</option>
        <option value="Frijoles">Frijoles</option>
        <option value="Harina">Harina</option>
      </select>
      <section></section>

      <label for="cantidad">Cantidad:</label>
      <input type="number" id="cantidad" />
      <button id="btnAgregar" class="btn-form">Agregar</button>

      <label for="precio">Precio unitario:</label>
      <input type="number" id="precio" />
      <section></section>
    </section>

    <section id="productoInfo">
      <div id="imagenProducto">
        <img id="productImage" src="" alt="Producto" />
      </div>
    </section>
  </section>

  <section class="card">
    <h3>Inventario</h3>

    <table id="tabla">
      <thead>
        <tr>
          <th>Producto</th>
          <th>Cantidad</th>
          <th>Precio</th>
          <th>Total</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <section class="total" id="totalGeneral">Total general: $0</section>
  </section>

  <script src="./inventario.js" defer></script>
</body>

</html>
